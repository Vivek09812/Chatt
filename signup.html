<!DOCTYPE html>
<html>

<head>

  <title>
    Signup
  </title>

  <link
  rel="stylesheet"
  href="style.css"
  >

</head>

<body>

<div class="auth-container">

  <div class="auth-box">

    <h1>
      Create Account 🚀
    </h1>

    <input
    type="text"
    id="name"
    placeholder="Enter Name"
    >
    <input
type="text"
id="username"
placeholder="Enter Username"
>

    <input
    type="email"
    id="signupEmail"
    placeholder="Enter Email"
    >

    <input
    type="password"
    id="signupPassword"
    placeholder="Enter Password"
    >

    <button
    onclick="signup()"
    >

      Create Account

    </button>

    <a href="login.html">

      <button>

        Back To Login

      </button>

    </a>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="app.js"></script>

</body>

</html>
