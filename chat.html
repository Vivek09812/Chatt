<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0
">

<title>
Vivek Chat
</title>

<script src="
https://cdn.jsdelivr.net/npm/@supabase/supabase-js
"></script>

<link
rel="stylesheet"
href="style.css"
>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(
180deg,
#020617,
#031525,
#041d33
);
min-height:100vh;
height:100dvh;
display:flex;
flex-direction:column;
overflow:hidden;
color:white;
}

.topbar{

height:80px;

background:
rgba(255,255,255,0.05);

backdrop-filter:
blur(10px);

display:flex;

align-items:center;

justify-content:space-between;

padding:
0 20px;

border-bottom:
1px solid
rgba(255,255,255,0.08);

}

.left{

display:flex;

align-items:center;

gap:15px;

}

.avatar{

width:55px;
height:55px;

border-radius:50%;

background:
linear-gradient(
45deg,
#00f0ff,
#00ff95
);

display:flex;

justify-content:center;

align-items:center;

font-size:24px;
font-weight:bold;

color:black;

}

.info h2{

font-size:22px;

}

.status{

font-size:15px;

color:#00ff95;

margin-top:3px;

}

.logout{

border:none;

padding:
12px 20px;

border-radius:14px;

font-size:17px;

font-weight:bold;

color:white;

background:
linear-gradient(
45deg,
#ff005d,
#ff4d00
);

}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
padding-bottom:120px;
display:flex;
flex-direction:column;
gap:18px;
}

.message{

max-width:80%;

padding:16px;

border-radius:20px;

font-size:20px;

word-break:break-word;

animation:
fade 0.2s linear;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

.user-message{

align-self:flex-end;

background:
linear-gradient(
45deg,
#00f0ff,
#00ff95
);

color:black;

border-bottom-right-radius:5px;

}

.admin-message{

align-self:flex-start;

background:
rgba(255,255,255,0.08);

border:
1px solid
rgba(255,255,255,0.08);

border-bottom-left-radius:5px;

}

.msg-bottom{

margin-top:12px;

display:flex;

justify-content:space-between;

align-items:center;

font-size:13px;

opacity:0.8;

gap:10px;

}

.delete-btn{

margin-top:10px;

border:none;

padding:
8px 14px;

border-radius:10px;

font-size:14px;

font-weight:bold;

background:
linear-gradient(
45deg,
#ff005d,
red
);

color:white;

}

.input-area{
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
display:flex;
gap:12px;
border-top:1px solid rgba(255,255,255,0.08);

position:sticky;
bottom:0;
z-index:999;
}

.input{

flex:1;

height:58px;

border:none;

outline:none;

border-radius:16px;

padding:
0 18px;

font-size:18px;

background:
rgba(255,255,255,0.08);

color:white;

}

.send{

border:none;

padding:
0 25px;

border-radius:16px;

font-size:18px;

font-weight:bold;

background:
linear-gradient(
45deg,
#00f0ff,
#00ff95
);

color:black;

}

.typing{

padding:
0 20px
10px;

font-size:15px;

color:#cbd5e1;

}

</style>

</head>

<body>

<div class="topbar">

<div class="left">

<div class="avatar">
V
</div>

<div class="info">

<h2>
Vivek Chat
</h2>

<div
class="status"
id="onlineStatus"
>

🟢 Online

</div>

</div>

</div>

<button
class="logout"
onclick="logout()"
>

Logout

</button>

</div>

<div
class="typing"
id="typingText"
>

</div>

<div
style="
padding:10px;
display:flex;
gap:10px;
background:rgba(255,255,255,0.05);
"
>

<input
id="searchUsername"
placeholder="Search Username..."
style="
flex:1;
padding:12px;
border:none;
border-radius:10px;
"
>

<button
onclick="searchUser()"
style="
padding:12px;
border:none;
border-radius:10px;
"
>

Search

</button>

</div>

<div
id="searchResult"
style="
padding:10px;
"
></div>
<div
id="requestsBox"
style="
padding:10px;
"
>

</div>


<div
class="messages"
id="messages"
>

</div>

<div class="input-area">

<input
type="text"
id="messageInput"
class="input"
placeholder="Type message 😄"
>

<button
class="send"
onclick="sendMessage()"
>

Send

</button>

</div>

<audio
id="notifSound"
src="notification.mp3"
></audio>

<script src="app.js"></script>

<script>

/* ENTER SEND */

const input =
document.getElementById(
"messageInput"
)

input.addEventListener(
"keypress",

function(e){

if(
e.key === "Enter"
){

sendMessage()

}

}

)

/* TYPING UI */

setInterval(

async ()=>{

const {

data:{user}

} =
await supabaseClient
.auth
.getUser()

if(!user){

return

}

const {

data

} =
await supabaseClient
.from("users")
.select("*")
.eq(
"email",
user.email
)
.single()

const typingText =
document.getElementById(
"typingText"
)

const onlineStatus =
document.getElementById(
"onlineStatus"
)

if(data?.typing){

typingText.innerHTML =
"✍️ Typing..."

}else{

typingText.innerHTML =
""

}

if(data?.online){

onlineStatus.innerHTML =
"🟢 Online"

}else{

onlineStatus.innerHTML =
`⚫ Last Seen:
${data?.last_seen || ""}`

}

},

1000

)

</script>

</body>

</html>
